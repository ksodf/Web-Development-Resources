name: CI – Link & Markdown Checks

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'copilot/**'
  pull_request:
    branches:
      - main

jobs:
  markdown-lint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: markdownlint '**/*.md' --ignore node_modules

  check-links:
    name: Check for broken links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.4.1
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302
            --accept 403
            --accept 429
            '**/*.md'
          # 403 is accepted because GitHub and some sites return Forbidden for
          # unauthenticated bots. 429 is accepted to avoid failing on rate-limited requests.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
